<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Creator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f14;
  color: #e2e8f0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  background: #1a1a26;
  border-bottom: 1px solid #2a2a3e;
  flex-shrink: 0;
}
header h1 {
  font-size: 16px;
  font-weight: 700;
  color: #f1f5f9;
  letter-spacing: -0.3px;
}
.spacer { flex: 1; }
.btn {
  padding: 6px 13px;
  border: none;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.btn-primary { background: #6366f1; color: white; }
.btn-primary:hover { background: #4f46e5; }
.btn-secondary { background: #25253a; color: #e2e8f0; border: 1px solid #3a3a52; }
.btn-secondary:hover { background: #2e2e46; }
.btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2a2a3e; }
.btn-ghost:hover { background: #1e1e30; color: #e2e8f0; }
.mode-toggle {
  display: flex;
  background: #25253a;
  border-radius: 7px;
  padding: 2px;
  gap: 2px;
}
.mode-btn {
  padding: 4px 11px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: #64748b;
  transition: all 0.12s;
}
.mode-btn.active { background: #6366f1; color: white; }
.dna-display {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #25253a;
  border-radius: 7px;
  padding: 5px 11px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  color: #64748b;
  cursor: pointer;
  border: 1px solid #3a3a52;
  user-select: none;
}
.dna-display:hover { border-color: #6366f1; }
.dna-display span { color: #a5b4fc; font-weight: 700; letter-spacing: 0.05em; }
main {
  flex: 1;
  display: grid;
  grid-template-columns: 265px 1fr 230px;
  overflow: hidden;
}
.panel {
  overflow-y: auto;
  padding: 14px;
}
.panel:first-child { border-right: 1px solid #2a2a3e; }
.panel:last-child { border-left: 1px solid #2a2a3e; background: #0d0d12; }
/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3a52; border-radius: 2px; }

/* Controls */
.part-group {
  margin-bottom: 12px;
  background: #1a1a26;
  border-radius: 10px;
  border: 1px solid #2a2a3e;
  overflow: hidden;
}
.part-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-bottom: 1px solid #2a2a3e;
}
.part-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #94a3b8;
  flex: 1;
}
.part-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 24px;
  height: 24px;
  border-radius: 5px;
  border: 1px solid #3a3a52;
  background: #25253a;
  color: #64748b;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  line-height: 1;
}
.icon-btn:hover { background: #2e2e46; color: #e2e8f0; }
.icon-btn.locked { background: #2d1b42; color: #c084fc; border-color: #7c3aed; }
.variant-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 8px;
}
.variant-btn {
  padding: 4px 9px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid #3a3a52;
  background: #25253a;
  color: #94a3b8;
  transition: all 0.12s;
  white-space: nowrap;
}
.variant-btn:hover { background: #2e2e46; color: #e2e8f0; }
.variant-btn.active {
  background: #2d2b5c;
  border-color: #6366f1;
  color: #a5b4fc;
  font-weight: 600;
}

/* Preview */
#preview-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  background: #111118;
  padding: 30px;
}
.preview-card {
  background: radial-gradient(ellipse 85% 75% at 50% 48%, rgba(99,102,241,0.1) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(34,211,238,0.06) 0%, transparent 45%),
    #0a0a12;
  border-radius: 28px;
  width: 280px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.12);
}
.preview-card svg {
  width: 240px;
  height: 240px;
}
.palette-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.palette-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #94a3b8;
}
.scale-wrap {
  padding: 8px 12px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.scale-wrap input[type="range"] {
  flex: 1;
  min-width: 0;
  accent-color: #6366f1;
}
.scale-val {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  color: #94a3b8;
  min-width: 38px;
  text-align: right;
}
.global-group .part-header { border-bottom: none; }
.swatch-grad {
  width: 36px;
  height: 12px;
  border-radius: 4px;
}
.palette-grid { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.palette-swatch {
  display: flex;
  gap: 2px;
  padding: 5px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.12s;
  background: #1a1a26;
}
.palette-swatch:hover { border-color: #3a3a5a; }
.palette-swatch.active { border-color: #6366f1; }
.swatch-dot { width: 12px; height: 12px; border-radius: 50%; }

/* Gallery */
.gallery-header {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #4a4a6a;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.gallery-count-badge {
  background: #25253a;
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 10px;
  color: #64748b;
}
.gallery-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.gallery-item {
  background: #1a1a26;
  border-radius: 10px;
  border: 1px solid #2a2a3e;
  padding: 6px;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
}
.gallery-item:hover { border-color: #6366f1; background: #1e1e30; }
.gallery-item svg { width: 100%; height: auto; display: block; }
.gallery-delete {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #3b1a1a;
  border: none;
  color: #f87171;
  font-size: 9px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.gallery-item:hover .gallery-delete { display: flex; }
.gallery-empty {
  grid-column: 1/-1;
  color: #2a2a40;
  font-size: 11px;
  text-align: center;
  padding: 24px 12px;
  line-height: 1.6;
}
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(40px);
  background: #25253a;
  border: 1px solid #3a3a52;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  color: #a5b4fc;
  opacity: 0;
  transition: all 0.2s;
  pointer-events: none;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal-r100 {
  background: #14141f;
  border: 1px solid #2a2a3e;
  border-radius: 14px;
  width: min(920px, 96vw);
  max-height: min(88vh, 900px);
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.55);
}
.modal-r100-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid #2a2a3e;
  flex-shrink: 0;
}
.modal-r100-header h2 { font-size: 14px; font-weight: 700; color: #e2e8f0; }
.modal-r100-header p { font-size: 11px; color: #64748b; margin-top: 2px; }
.modal-r100-close {
  padding: 6px 12px;
  border-radius: 7px;
  border: 1px solid #3a3a52;
  background: #25253a;
  color: #94a3b8;
  font-size: 12px;
  cursor: pointer;
}
.modal-r100-close:hover { background: #2e2e46; color: #e2e8f0; }
.modal-r100-body { overflow-y: auto; padding: 14px 16px 18px; flex: 1; }
.modal-r100-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
}
@media (max-width: 800px) {
  .modal-r100-grid { grid-template-columns: repeat(5, 1fr); }
}
.r100-cell {
  aspect-ratio: 1;
  background: #0a0a12;
  border-radius: 10px;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.12s, transform 0.1s;
  padding: 4px;
}
.r100-cell:hover { border-color: #6366f1; transform: scale(1.03); }
.r100-cell svg { width: 100%; height: 100%; display: block; }
.header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<header>
  <h1>Character Creator</h1>
  <div class="mode-toggle">
    <button class="mode-btn" data-mode="two-piece">Two-piece</button>
    <button class="mode-btn active" data-mode="one-piece">One-piece</button>
  </div>
  <div class="spacer"></div>
  <div class="dna-display" id="dna-display" title="Click to copy">
    DNA <span id="dna-code">3OAAAAAAAAAAA2</span>
  </div>
  <button class="btn btn-ghost" id="btn-import">Import DNA</button>
  <div class="header-actions">
    <button class="btn btn-secondary" id="btn-randomize">🎲 Randomize</button>
    <button class="btn btn-secondary" id="btn-randomize-100">Randomize 100</button>
  </div>
  <button class="btn btn-secondary" id="btn-save">💾 Save</button>
  <button class="btn btn-primary" id="btn-export">↓ PNG</button>
</header>

<main>
  <div class="panel" id="controls-panel"></div>

  <div id="preview-panel">
    <div class="preview-card">
      <svg id="char-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="palette-section">
      <div class="palette-label">Palette</div>
      <div class="palette-grid" id="palette-grid"></div>
    </div>
  </div>

  <div class="panel" id="gallery-panel">
    <div class="gallery-header">
      <span>Saved Characters</span>
      <span class="gallery-count-badge" id="gallery-count">0</span>
    </div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-empty">No saved characters yet.<br>Hit 💾 to save one.</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-r100" aria-hidden="true">
  <div class="modal-r100" role="dialog" aria-labelledby="r100-title">
    <div class="modal-r100-header">
      <div>
        <h2 id="r100-title">100 random characters</h2>
        <p>Scroll and click any tile to save it to your gallery and load it in the editor.</p>
      </div>
      <button type="button" class="modal-r100-close" id="btn-r100-close">Close</button>
    </div>
    <div class="modal-r100-body">
      <div class="modal-r100-grid" id="r100-grid"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// PALETTES
// ─────────────────────────────────────────────
const PALETTES = [
  { name:'Lavender Mint',
    strokeDeep:'#0c1220', highlight:'#eef2ff',
    css:'linear-gradient(135deg,#D6D6FF 0%,#B2FFD8 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#D6D6FF'],['100%','#B2FFD8']] },
    alt:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#86EFAC'],['100%','#67E8F9']] },
    accent:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#93C5FD'],['100%','#C4B5FD']] },
  },
  { name:'Sky Bloom',
    strokeDeep:'#0b1020', highlight:'#f0f9ff',
    css:'linear-gradient(120deg,#BAE6FD 0%,#DDD6FE 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#BAE6FD'],['100%','#DDD6FE']] },
    alt:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#A5F3FC'],['100%','#C7D2FE']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#7DD3FC'],['100%','#E9D5FF']] },
  },
  { name:'Teal Drift',
    strokeDeep:'#0a1620', highlight:'#ecfeff',
    css:'linear-gradient(135deg,#5EEAD4 0%,#312E81 100%)',
    main:{ x1:0,y1:1,x2:1,y2:0, stops:[['0%','#5EEAD4'],['100%','#6366F1']] },
    alt:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#99F6E4'],['100%','#818CF8']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#2DD4BF'],['100%','#A5B4FC']] },
  },
  { name:'Neon Mist',
    strokeDeep:'#0f172a', highlight:'#f7fee7',
    css:'linear-gradient(145deg,#D9F99D 0%,#22D3EE 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#D9F99D'],['100%','#22D3EE']] },
    alt:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#A3E635'],['100%','#38BDF8']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#BEF264'],['100%','#67E8F9']] },
  },
  { name:'Violet Haze',
    strokeDeep:'#0c0a1a', highlight:'#faf5ff',
    css:'linear-gradient(135deg,#C4B5FD 0%,#FDA4AF 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#C4B5FD'],['100%','#FDA4AF']] },
    alt:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#DDD6FE'],['100%','#FBCFE8']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#A78BFA'],['100%','#F9A8D4']] },
  },
  { name:'Deep Current',
    strokeDeep:'#020617', highlight:'#e0f2fe',
    css:'linear-gradient(160deg,#1E3A8A 0%,#06B6D4 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#1E3A8A'],['100%','#06B6D4']] },
    alt:{ x1:0,y1:1,x2:1,y2:0, stops:[['0%','#312E81'],['100%','#22D3EE']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#3B82F6'],['100%','#2DD4BF']] },
  },
  { name:'Soft Aurora',
    strokeDeep:'#0f172a', highlight:'#f8fafc',
    css:'linear-gradient(135deg,#E0E7FF 0%,#CCFBF1 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#E0E7FF'],['100%','#CCFBF1']] },
    alt:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#C7D2FE'],['100%','#99F6E4']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#A5B4FC'],['100%','#5EEAD4']] },
  },
  { name:'Cool Slate',
    strokeDeep:'#0f172a', highlight:'#f1f5f9',
    css:'linear-gradient(135deg,#94A3B8 0%,#C4B5FD 100%)',
    main:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#CBD5E1'],['100%','#C4B5FD']] },
    alt:{ x1:0,y1:0,x2:1,y2:1, stops:[['0%','#94A3B8'],['100%','#A5B4FC']] },
    accent:{ x1:0,y1:0.5,x2:1,y2:0.5, stops:[['0%','#64748B'],['100%','#818CF8']] },
  },
];

function hexToRgb(hex) {
  const h = String(hex).replace('#', '');
  return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };
}
function rgbToHex(r, g, b) {
  const x = (n) => Math.max(0, Math.min(255, n | 0)).toString(16).padStart(2, '0');
  return `#${x(r)}${x(g)}${x(b)}`;
}
function mixHex(c1, c2, t) {
  const A = hexToRgb(c1), B = hexToRgb(c2);
  return rgbToHex(A.r + (B.r - A.r) * t, A.g + (B.g - A.g) * t, A.b + (B.b - A.b) * t);
}

function buildGradientDefs(pi) {
  const pal = PALETTES[pi];
  const mk = (id, spec) => {
    const [[o0, c0], [o1, c1]] = spec.stops;
    const c0s = mixHex(c0, c1, 0.2);
    const c1s = mixHex(c1, c0, 0.2);
    const cMid = mixHex(c0, c1, 0.5);
    const stops = `<stop offset="${o0}" stop-color="${c0s}"/><stop offset="50%" stop-color="${cMid}"/><stop offset="${o1}" stop-color="${c1s}"/>`;
    return `<linearGradient id="g${pi}_${id}" x1="${spec.x1}" y1="${spec.y1}" x2="${spec.x2}" y2="${spec.y2}" gradientUnits="objectBoundingBox">${stops}</linearGradient>`;
  };
  return `<defs>${mk('main', pal.main)}${mk('alt', pal.alt)}${mk('accent', pal.accent)}</defs>`;
}

function gurl(pi, name) { return `url(#g${pi}_${name})`; }

const SCALE_INDEX_MAX = 55;
/** Narrow band so scaled silhouettes stay inside the 200×200 viewBox. */
function scaleFromIndex(si) {
  const s = Math.min(SCALE_INDEX_MAX, Math.max(0, si));
  return 0.82 + (s / SCALE_INDEX_MAX) * 0.2;
}

const SCALE_INDEX_RANDOM_MIN = 18;
const SCALE_INDEX_RANDOM_MAX = 42;

function effectiveScaleForState(s, raw) {
  const cap = s.mode === 'one-piece' ? 0.98 : 1;
  return Math.min(raw, cap);
}

// ─────────────────────────────────────────────
// LAYOUT (bounds match PARTS body/head SVG geometry)
// ─────────────────────────────────────────────
const LAYOUT_OVERLAP = 5;
const BODY_TWOPIC_BOUNDS = [
  { left: 62, right: 138, top: 95, bottom: 161 },
  { left: 73, right: 127, top: 88, bottom: 172 },
  { left: 64, right: 136, top: 97, bottom: 160 },
  { left: 54, right: 146, top: 109, bottom: 159 },
  { left: 64, right: 136, top: 94, bottom: 166 },
  { left: 70, right: 130, top: 90, bottom: 166 },
  { left: 58, right: 142, top: 96, bottom: 161 },
  { left: 70, right: 130, top: 92, bottom: 170 },
];
const BODY_ONEPIECE_BOUNDS = [
  { left: 58, right: 142, top: 48, bottom: 168 },
  { left: 64, right: 136, top: 50, bottom: 166 },
  { left: 54, right: 146, top: 46, bottom: 168 },
  { left: 66, right: 134, top: 46, bottom: 170 },
  { left: 56, right: 144, top: 50, bottom: 166 },
  { left: 48, right: 152, top: 80, bottom: 136 },
  { left: 42, right: 158, top: 50, bottom: 166 },
  { left: 52, right: 148, top: 46, bottom: 170 },
  { left: 54, right: 146, top: 50, bottom: 170 },
];
const HEAD_HBELOW = [27, 24, 23, 30, 26, 18, 22, 22];
const HEAD_EYE_DX = [12, 10, 14, 9, 11, 12, 14, 10];
const HEAD_EYE_YOFF = [-2, -2, -2, -3, -2, -2, -2, -2];
const HEAD_EAR_XOFF = [0, 0, -2, 0, 0, 0, 0, 0];
const HEAD_LEFT = [27, 24, 32, 21, 28, 30, 32, 22];

/** Left/right x where the torso silhouette meets a horizontal line at y (shoulder slice). */
function ellipseXLateral(cx, cy, rx, ry, y) {
  const t = 1 - Math.pow((y - cy) / ry, 2);
  if (t <= 0) return { left: cx - rx, right: cx + rx };
  const dx = rx * Math.sqrt(t);
  return { left: cx - dx, right: cx + dx };
}

function rectLeftEdgeAtY(x0, y0, w, h, rx, y) {
  const r = Math.min(rx, w / 2, h / 2);
  const y1 = y0 + h;
  const cxTL = x0 + r;
  const cyTL = y0 + r;
  const cxBL = x0 + r;
  const cyBL = y1 - r;
  if (y < y0 || y > y1) return x0;
  if (y <= cyTL) {
    const dy = y - cyTL;
    const q = r * r - dy * dy;
    if (q < 0) return x0;
    return cxTL - Math.sqrt(q);
  }
  if (y >= cyBL) {
    const dy = y - cyBL;
    const q = r * r - dy * dy;
    if (q < 0) return x0;
    return cxBL - Math.sqrt(q);
  }
  return x0;
}

function rectRightEdgeAtY(x0, y0, w, h, rx, y) {
  const r = Math.min(rx, w / 2, h / 2);
  const x1 = x0 + w;
  const y1 = y0 + h;
  const cxTR = x1 - r;
  const cyTR = y0 + r;
  const cxBR = x1 - r;
  const cyBR = y1 - r;
  if (y < y0 || y > y1) return x1;
  if (y <= cyTR) {
    const dy = y - cyTR;
    const q = r * r - dy * dy;
    if (q < 0) return x1;
    return cxTR + Math.sqrt(q);
  }
  if (y >= cyBR) {
    const dy = y - cyBR;
    const q = r * r - dy * dy;
    if (q < 0) return x1;
    return cxBR + Math.sqrt(q);
  }
  return x1;
}

function twopieceShoulderLateral(bi, bx, by, sy) {
  switch (bi) {
    case 0: return ellipseXLateral(bx, by, 38, 33, sy);
    case 1: return ellipseXLateral(bx, by + 2, 27, 42, sy);
    case 2: {
      const x0 = bx - 36, y0 = by - 31, w = 72, h = 63, rx = 18;
      return { left: rectLeftEdgeAtY(x0, y0, w, h, rx, sy), right: rectRightEdgeAtY(x0, y0, w, h, rx, sy) };
    }
    case 3: return ellipseXLateral(bx, by + 6, 46, 25, sy);
    case 4: return ellipseXLateral(bx, by + 2, 36, 36, sy);
    case 5: {
      const x0 = bx - 30, y0 = by - 38, w = 60, h = 76, rx = 30;
      return { left: rectLeftEdgeAtY(x0, y0, w, h, rx, sy), right: rectRightEdgeAtY(x0, y0, w, h, rx, sy) };
    }
    case 6: return ellipseXLateral(bx, by, 40, 34, sy);
    case 7: return ellipseXLateral(bx, by - 4, 32, 38, sy);
    default: return ellipseXLateral(bx, by, 38, 33, sy);
  }
}

function onepieceShoulderLateral(bi, bx, by, sy) {
  switch (bi) {
    case 0: return ellipseXLateral(bx, by, 42, 60, sy);
    case 1: {
      const x0 = bx - 36, y0 = by - 58, w = 72, h = 116, rx = 28;
      return { left: rectLeftEdgeAtY(x0, y0, w, h, rx, sy), right: rectRightEdgeAtY(x0, y0, w, h, rx, sy) };
    }
    case 2: return ellipseXLateral(bx, by + 2, 42, 58, sy);
    case 3: {
      const x0 = bx - 34, y0 = by - 62, w = 68, h = 124, rx = 34;
      return { left: rectLeftEdgeAtY(x0, y0, w, h, rx, sy), right: rectRightEdgeAtY(x0, y0, w, h, rx, sy) };
    }
    case 4: {
      const x0 = bx - 44, y0 = by - 58, w = 88, h = 116, rx = 36;
      return { left: rectLeftEdgeAtY(x0, y0, w, h, rx, sy), right: rectRightEdgeAtY(x0, y0, w, h, rx, sy) };
    }
    case 5: {
      const x0 = bx - 52, y0 = by - 28, w = 104, h = 56, rx = 28;
      return { left: rectLeftEdgeAtY(x0, y0, w, h, rx, sy), right: rectRightEdgeAtY(x0, y0, w, h, rx, sy) };
    }
    case 6: return ellipseXLateral(bx, by, 58, 58, sy);
    case 7: return ellipseXLateral(bx, by + 2, 44, 58, sy);
    case 8: return ellipseXLateral(bx, by + 4, 40, 56, sy);
    default: return ellipseXLateral(bx, by, 42, 60, sy);
  }
}

function getAnchorsFromState(s) {
  const bx = 100;
  const by = s.mode === 'two-piece' ? 128 : 108;
  if (s.mode === 'one-piece') {
    const bi = Math.min(Math.max(0, s.parts.body_onepiece || 0), BODY_ONEPIECE_BOUNDS.length - 1);
    const B = BODY_ONEPIECE_BOUNDS[bi];
    const midY = B.top + 0.28 * (B.bottom - B.top);
    let shoulderY = B.top + 0.38 * (B.bottom - B.top);
    const earIdx = s.parts.ears || 0;
    if (earIdx > 0) shoulderY += 8;
    let { left: sl, right: sr } = onepieceShoulderLateral(bi, bx, by, shoulderY);
    if (earIdx > 0) {
      const earIn = 6 + Math.min(3, earIdx);
      sl += earIn;
      sr -= earIn;
    }
    const footInset = 0.14 * (B.right - B.left);
    const llx = B.left + footInset + 10;
    const rlx = B.right - footInset - 10;
    const lly = B.bottom - 12;
    const hx = 100;
    const hy = B.top + 0.38 * (B.bottom - B.top);
    return {
      bx, by,
      bodyLeft: B.left,
      bodyRight: B.right,
      bodyTop: B.top,
      bodyBottom: B.bottom,
      hx,
      hy,
      lax: B.left,
      rax: B.right,
      lay: shoulderY,
      ray: shoulderY,
      llx,
      rlx,
      lly,
      rly: lly,
      lex: B.left + 16,
      rex: B.right - 16,
      ley: B.top + 22,
      rey: B.top + 22,
      lEx: hx - 12,
      rEx: hx + 12,
      lEy: hy - 2,
      rEy: hy - 2,
      shoulderLeft: sl,
      shoulderRight: sr,
      armOutL: sl - 18,
      armOutR: sr + 18,
      hmxL: sl - 24,
      hmxR: sr + 24,
      hmy: shoulderY + 12,
      neck: null,
    };
  }

  const bi = Math.min(Math.max(0, s.parts.body || 0), BODY_TWOPIC_BOUNDS.length - 1);
  const hi = Math.min(Math.max(0, s.parts.head || 0), HEAD_HBELOW.length - 1);
  const B = BODY_TWOPIC_BOUNDS[bi];
  const headBelow = HEAD_HBELOW[hi];
  const bodyTop = B.top;
  const hy = bodyTop - headBelow + LAYOUT_OVERLAP;
  const hx = 100;
  const headLeft = hx - HEAD_LEFT[hi];
  const headRight = hx + HEAD_LEFT[hi];
  let shoulderY = B.top + 0.42 * (B.bottom - B.top);
  const earIdx2 = s.parts.ears || 0;
  if (earIdx2 > 0) shoulderY += 8;
  let { left: sl, right: sr } = twopieceShoulderLateral(bi, bx, by, shoulderY);
  if (earIdx2 > 0) {
    const earIn = 6 + Math.min(3, earIdx2);
    sl += earIn;
    sr -= earIn;
  }
  const footInset = 0.12 * (B.right - B.left);
  const llx = B.left + footInset + 8;
  const rlx = B.right - footInset - 8;
  const lly = B.bottom - 12;
  const eyeDx = HEAD_EYE_DX[hi];
  const eyo = HEAD_EYE_YOFF[hi];
  const earX = HEAD_EAR_XOFF[hi];
  const bl = B.left;
  const br = B.right;
  const armOutL = sl - 16;
  const armOutR = sr + 16;
  return {
    bx,
    by,
    bodyLeft: bl,
    bodyRight: br,
    bodyTop,
    bodyBottom: B.bottom,
    hx,
    hy,
    headBottom: hy + headBelow,
    headLeft,
    headRight,
    lax: bl,
    rax: br,
    lay: shoulderY,
    ray: shoulderY,
    llx,
    rlx,
    lly,
    rly: lly,
    lex: headLeft + earX,
    rex: headRight - earX,
    ley: hy - 8,
    rey: hy - 8,
    lEx: hx - eyeDx,
    rEx: hx + eyeDx,
    lEy: hy + eyo,
    rEy: hy + eyo,
    shoulderLeft: sl,
    shoulderRight: sr,
    armOutL,
    armOutR,
    hmxL: armOutL - 6,
    hmxR: armOutR + 6,
    hmy: shoulderY + 12,
    neck: {
      x: hx - 14,
      y: bodyTop - 1,
      w: 28,
      h: LAYOUT_OVERLAP + 8,
    },
  };
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const PART_ORDER = ['body','body_onepiece','head','eyes','arms','hands','legs','feet','ears'];
const OLD_V2_PART_ORDER = ['body','body_onepiece','head','eyes','eyebrows','mouth','arms','hands','legs','feet','ears'];
const OLD_PART_ORDER = ['body','body_onepiece','head','eyes','eyebrows','mouth','arms','hands','legs','feet','ears','topper','tail','accessory'];

const state = {
  mode: 'one-piece',
  palette: 0,
  scaleIndex: 28,
  parts: Object.fromEntries(PART_ORDER.map(k=>[k,0])),
  locks: {},
};

// ─────────────────────────────────────────────
// LIMB RULES (hands = full arm; feet = full leg)
// ─────────────────────────────────────────────
function applyLimbRulesToParts(parts) {
  if (!parts) return;
  if ((parts.hands || 0) > 0) parts.arms = 0;
  if ((parts.feet || 0) > 0) parts.legs = 0;
  if ((parts.arms || 0) > 0) parts.hands = 0;
  if ((parts.legs || 0) > 0) parts.feet = 0;
}

function applyLimbRules() {
  applyLimbRulesToParts(state.parts);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderCharacter(s) {
  const pi = s.palette;
  const pal = PALETTES[pi];
  const p = {
    ...pal,
    stroke: pal.strokeDeep,
    u: (name) => gurl(pi, name),
  };
  const a = getAnchorsFromState(s);
  const get = (key, idx) => {
    const variants = PARTS[key].variants;
    const i = Math.min(Math.max(0, idx), variants.length - 1);
    return variants[i].render(a, p);
  };
  const layers = [];
  const parts = s.parts;
  const armLayer = (parts.hands || 0) > 0 ? get('hands', parts.hands) : get('arms', parts.arms);
  const legLayer = (parts.feet || 0) > 0 ? get('feet', parts.feet) : get('legs', parts.legs);

  if (s.mode === 'two-piece') {
    layers.push(get('ears', parts.ears));
    layers.push(legLayer);
    layers.push(armLayer);
    layers.push(get('body', parts.body));
    layers.push(get('head', parts.head));
  } else {
    layers.push(get('ears', parts.ears));
    layers.push(legLayer);
    layers.push(armLayer);
    layers.push(get('body_onepiece', parts.body_onepiece));
  }

  layers.push(get('eyes', parts.eyes));

  const si = s.scaleIndex != null ? s.scaleIndex : 28;
  const scale = effectiveScaleForState(s, scaleFromIndex(si));
  const inner = layers.join('');
  return buildGradientDefs(pi) + `<g transform="translate(100,100) scale(${scale}) translate(-100,-100)">${inner}</g>`;
}

// ─────────────────────────────────────────────
// DNA
// ─────────────────────────────────────────────
const DNA_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const DNA_VERSION = '3';

function encodeDNA(s) {
  let d = DNA_VERSION;
  d += s.mode === 'two-piece' ? 'T' : 'O';
  d += DNA_CHARS[s.palette] || 'A';
  for (const k of PART_ORDER) {
    d += DNA_CHARS[s.parts[k] || 0] || 'A';
  }
  const si = Math.min(SCALE_INDEX_MAX, Math.max(0, s.scaleIndex != null ? s.scaleIndex : 28));
  d += DNA_CHARS[Math.floor(si / 36)] + DNA_CHARS[si % 36];
  return d;
}

function decodeDNA(dna) {
  try {
    const u = String(dna).toUpperCase().trim();
    if (!u.length) return null;

    if (u[0] === DNA_VERSION) {
      const s = { parts: {}, locks: {}, scaleIndex: 28 };
      if (u.length < 3) return null;
      s.mode = u[1] === 'O' ? 'one-piece' : 'two-piece';
      let pi = DNA_CHARS.indexOf(u[2]);
      s.palette = pi >= 0 ? pi : 0;
      let i = 3;
      for (const k of PART_ORDER) {
        if (i >= u.length) break;
        const idx = DNA_CHARS.indexOf(u[i]);
        s.parts[k] = idx >= 0 ? idx : 0;
        i++;
      }
      for (const k of PART_ORDER) {
        if (s.parts[k] === undefined) s.parts[k] = 0;
      }
      const hi = i < u.length ? DNA_CHARS.indexOf(u[i]) : -1;
      const lo = i + 1 < u.length ? DNA_CHARS.indexOf(u[i + 1]) : -1;
      if (hi >= 0 && lo >= 0) {
        s.scaleIndex = hi * 36 + lo;
        if (s.scaleIndex > SCALE_INDEX_MAX) s.scaleIndex = SCALE_INDEX_MAX;
      }
      return s;
    }

    if (u[0] === '2') {
      const s = { parts: {}, locks: {}, scaleIndex: 28 };
      if (u.length < 3) return null;
      s.mode = u[1] === 'O' ? 'one-piece' : 'two-piece';
      let pal = DNA_CHARS.indexOf(u[2]);
      s.palette = pal >= 0 ? pal : 0;
      let i = 3;
      for (const k of OLD_V2_PART_ORDER) {
        if (i >= u.length) break;
        const idx = DNA_CHARS.indexOf(u[i]);
        if (k !== 'eyebrows' && k !== 'mouth' && PART_ORDER.includes(k)) {
          s.parts[k] = idx >= 0 ? idx : 0;
        }
        i++;
      }
      for (const k of PART_ORDER) {
        if (s.parts[k] === undefined) s.parts[k] = 0;
      }
      const sc = i < u.length ? DNA_CHARS.indexOf(u[i]) : -1;
      const oldSc = sc >= 0 ? sc : 17;
      s.scaleIndex = Math.min(SCALE_INDEX_MAX, Math.round(oldSc * (SCALE_INDEX_MAX / 35)));
      return s;
    }

    if (u[0] !== 'T' && u[0] !== 'O') return null;
    const s = { parts: {}, locks: {}, scaleIndex: 28 };
    s.mode = u[0] === 'O' ? 'one-piece' : 'two-piece';
    let pal = DNA_CHARS.indexOf(u[1]);
    s.palette = pal >= 0 ? pal : 0;
    for (let j = 0; j < OLD_PART_ORDER.length && 2 + j < u.length; j++) {
      const key = OLD_PART_ORDER[j];
      if (key === 'topper' || key === 'tail' || key === 'accessory' || key === 'eyebrows' || key === 'mouth') continue;
      const idx = DNA_CHARS.indexOf(u[2 + j]);
      if (PART_ORDER.includes(key)) s.parts[key] = idx >= 0 ? idx : 0;
    }
    for (const k of PART_ORDER) {
      if (s.parts[k] === undefined) s.parts[k] = 0;
    }
    return s;
  } catch (e) { return null; }
}

// ─────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────
function partsForMode(mode) {
  return mode === 'two-piece'
    ? ['body','head','eyes','arms','hands','legs','feet','ears']
    : ['body_onepiece','eyes','arms','hands','legs','feet','ears'];
}

function buildControls() {
  const panel = document.getElementById('controls-panel');
  const show = partsForMode(state.mode);
  const scaleVal = scaleFromIndex(state.scaleIndex != null ? state.scaleIndex : 28).toFixed(2);
  const globalHtml = `<div class="part-group global-group">
    <div class="part-header">
      <span class="part-label">Size</span>
      <div class="part-actions">
        <button class="icon-btn" data-action="rand-scale" title="Randomize size">🎲</button>
        <button class="icon-btn ${state.locks['__scale']?'locked':''}" data-action="lock-scale" title="${state.locks['__scale']?'Unlock':'Lock'}">🔒</button>
      </div>
    </div>
    <div class="scale-wrap">
      <input type="range" id="scale-slider" min="0" max="${SCALE_INDEX_MAX}" value="${state.scaleIndex != null ? state.scaleIndex : 28}" />
      <span class="scale-val" id="scale-val">${scaleVal}×</span>
    </div>
  </div>`;
  panel.innerHTML = globalHtml + show.map(k => {
    const part = PARTS[k];
    const locked = state.locks[k];
    const cur = state.parts[k] || 0;
    return `<div class="part-group">
      <div class="part-header">
        <span class="part-label">${part.label}</span>
        <div class="part-actions">
          <button class="icon-btn" data-action="rand-part" data-part="${k}" title="Randomize">🎲</button>
          <button class="icon-btn ${locked?'locked':''}" data-action="lock-part" data-part="${k}" title="${locked?'Unlock':'Lock'}">🔒</button>
        </div>
      </div>
      <div class="variant-grid">
        ${part.variants.map((v,i)=>`<button class="variant-btn ${i===cur?'active':''}" data-action="set-variant" data-part="${k}" data-variant="${i}">${v.name}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function buildPalettes() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = PALETTES.map((p,i)=>`
    <div class="palette-swatch ${i===state.palette?'active':''}" data-action="set-palette" data-idx="${i}" title="${p.name}">
      <div class="swatch-grad" style="background:${p.css}"></div>
    </div>
  `).join('');
}

function updatePreview() {
  document.getElementById('char-svg').innerHTML = renderCharacter(state);
}
function updateDNA() {
  document.getElementById('dna-code').textContent = encodeDNA(state);
}
function updateAll() {
  applyLimbRules();
  buildControls();
  buildPalettes();
  updatePreview();
  updateDNA();
}

// ─────────────────────────────────────────────
// GALLERY
// ─────────────────────────────────────────────
let gallery = JSON.parse(localStorage.getItem('cc-gallery') || '[]');

function saveGallery() { localStorage.setItem('cc-gallery', JSON.stringify(gallery)); }

function buildGallery() {
  const grid = document.getElementById('gallery-grid');
  document.getElementById('gallery-count').textContent = gallery.length;
  if (!gallery.length) {
    grid.innerHTML = '<div class="gallery-empty">No saved characters yet.<br>Hit 💾 to save one.</div>';
    return;
  }
  grid.innerHTML = gallery.map((item,i)=>`
    <div class="gallery-item" data-action="load-char" data-dna="${item.dna}">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${item.svg}</svg>
      <button class="gallery-delete" data-action="del-char" data-idx="${i}" title="Delete">✕</button>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// RANDOMIZE
// ─────────────────────────────────────────────
function randPart(k) {
  if (state.locks[k]) return;
  const max = PARTS[k].variants.length;
  state.parts[k] = Math.floor(Math.random() * max);
}
function randomScaleIndex() {
  return SCALE_INDEX_RANDOM_MIN + Math.floor(Math.random() * (SCALE_INDEX_RANDOM_MAX - SCALE_INDEX_RANDOM_MIN + 1));
}

function randomizeAll() {
  partsForMode(state.mode).forEach(k => randPart(k));
  if (!state.locks['__palette']) state.palette = Math.floor(Math.random() * PALETTES.length);
  if (!state.locks['__scale']) state.scaleIndex = randomScaleIndex();
  applyLimbRules();
  updateAll();
}

function openRandomize100() {
  const grid = document.getElementById('r100-grid');
  const overlay = document.getElementById('modal-r100');
  grid.innerHTML = '';
  for (let i = 0; i < 100; i++) {
    const s = {
      mode: state.mode,
      palette: Math.floor(Math.random() * PALETTES.length),
      scaleIndex: randomScaleIndex(),
      parts: Object.fromEntries(PART_ORDER.map(k => [k, 0])),
      locks: {},
    };
    partsForMode(s.mode).forEach(k => {
      s.parts[k] = Math.floor(Math.random() * PARTS[k].variants.length);
    });
    applyLimbRulesToParts(s.parts);
    const dna = encodeDNA(s);
    const svgInner = renderCharacter(s);
    const cell = document.createElement('div');
    cell.className = 'r100-cell';
    cell.title = 'Click to save to gallery and load';
    cell.innerHTML = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${svgInner}</svg>`;
    cell.addEventListener('click', () => {
      const loaded = decodeDNA(dna);
      if (!loaded) return;
      Object.assign(state, loaded);
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === state.mode)
      );
      updateAll();
      const saveDna = encodeDNA(state);
      if (gallery.some(g => g.dna === saveDna)) {
        showToast('Already in gallery');
      } else {
        if (gallery.length >= 24) gallery.shift();
        gallery.push({ dna: saveDna, svg: document.getElementById('char-svg').innerHTML });
        saveGallery();
        buildGallery();
        showToast('Saved to gallery ✓');
      }
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
    });
    grid.appendChild(cell);
  }
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
}

// ─────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────
function exportPNG() {
  const svgEl = document.getElementById('char-svg');
  const clone = svgEl.cloneNode(true);
  clone.insertAdjacentHTML('afterbegin', '<rect width="200" height="200" fill="#0a0a12"/>');
  const svgStr = new XMLSerializer().serializeToString(clone);
  const canvas = document.createElement('canvas');
  canvas.width = 600; canvas.height = 600;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 600, 600);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `char-${encodeDNA(state)}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const { action, part, variant, idx, dna } = el.dataset;

  if (action === 'set-variant') {
    state.parts[part] = parseInt(variant);
    applyLimbRules();
    buildControls();
    updatePreview(); updateDNA();
  }
  else if (action === 'lock-part') {
    state.locks[part] = !state.locks[part];
    el.classList.toggle('locked', state.locks[part]);
  }
  else if (action === 'rand-part') {
    state.locks[part] = false;
    randPart(part);
    applyLimbRules();
    buildControls(); updatePreview(); updateDNA();
  }
  else if (action === 'set-palette') {
    state.palette = parseInt(idx);
    buildPalettes(); updatePreview(); updateDNA();
  }
  else if (action === 'load-char') {
    const loaded = decodeDNA(dna);
    if (loaded) {
      Object.assign(state, loaded);
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === state.mode)
      );
      updateAll();
    }
  }
  else if (action === 'del-char') {
    e.stopPropagation();
    gallery.splice(parseInt(idx), 1);
    saveGallery(); buildGallery();
  }
  else if (action === 'rand-scale') {
    if (state.locks['__scale']) return;
    state.scaleIndex = randomScaleIndex();
    buildControls(); updatePreview(); updateDNA();
  }
  else if (action === 'lock-scale') {
    state.locks['__scale'] = !state.locks['__scale'];
    el.classList.toggle('locked', state.locks['__scale']);
  }
});

document.getElementById('controls-panel').addEventListener('input', (e) => {
  if (e.target.id === 'scale-slider') {
    state.scaleIndex = Math.min(SCALE_INDEX_MAX, Math.max(0, parseInt(e.target.value, 10)));
    const sv = document.getElementById('scale-val');
    if (sv) sv.textContent = scaleFromIndex(state.scaleIndex).toFixed(2) + '×';
    updatePreview(); updateDNA();
  }
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b===btn));
    updateAll();
  });
});

document.getElementById('btn-randomize').addEventListener('click', randomizeAll);
document.getElementById('btn-randomize-100').addEventListener('click', openRandomize100);
document.getElementById('btn-r100-close').addEventListener('click', () => {
  const overlay = document.getElementById('modal-r100');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
});
document.getElementById('modal-r100').addEventListener('click', (e) => {
  if (e.target.id === 'modal-r100') {
    e.currentTarget.classList.remove('open');
    e.currentTarget.setAttribute('aria-hidden', 'true');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('modal-r100');
    if (overlay.classList.contains('open')) {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
    }
  }
});

document.getElementById('btn-save').addEventListener('click', () => {
  const dna = encodeDNA(state);
  if (gallery.some(g => g.dna === dna)) { showToast('Already saved!'); return; }
  if (gallery.length >= 24) gallery.shift();
  gallery.push({ dna, svg: document.getElementById('char-svg').innerHTML });
  saveGallery(); buildGallery();
  showToast('Saved to gallery ✓');
});

document.getElementById('btn-export').addEventListener('click', exportPNG);

document.getElementById('dna-display').addEventListener('click', () => {
  navigator.clipboard.writeText(encodeDNA(state)).then(() => showToast('DNA copied to clipboard'));
});

document.getElementById('btn-import').addEventListener('click', () => {
  const code = prompt('Paste a character DNA code:');
  if (!code) return;
  const loaded = decodeDNA(code.trim().toUpperCase());
  if (loaded) {
    Object.assign(state, loaded);
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === state.mode)
    );
    updateAll();
    showToast('Character loaded ✓');
  } else {
    showToast('Invalid DNA code');
  }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
updateAll();
buildGallery();
</script>
</body>
</html>
